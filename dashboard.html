<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Swiftly Partner Console</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    * { box-sizing: border-box; margin: 0; }
    body {
      font-family: 'Kanit', sans-serif;
      background: #0C0C0C;
      color: #D7E2EA;
      -webkit-font-smoothing: antialiased;
    }
    :root {
      --bg: #0C0C0C;
      --surface: #141517;
      --surface-2: #1b1d21;
      --border: rgba(215,226,234,0.09);
      --text: #D7E2EA;
      --text-dim: rgba(215,226,234,0.58);
      --text-dimmer: rgba(215,226,234,0.36);
      --accent: #00C48C;
      --accent-2: #7CD859;
      --accent-3: #FFD400;
      --accent-grad: linear-gradient(123deg, #063927 7%, #00C48C 37%, #7CD859 72%, #FFD400 100%);
      --accent-soft: rgba(0,196,140,0.15);
      --green: #3ddc84;
      --amber: #FFD400;
      --red: #FF5C5C;
      --slate: #9AA5B1;
      --display: 'Kanit', sans-serif;
      --mono: 'Kanit', sans-serif;
      --ease: cubic-bezier(.22,1,.36,1);
    }
    @media (prefers-reduced-motion: reduce){
      *,*::before,*::after{ animation-duration:.001ms !important; animation-iteration-count:1 !important; transition-duration:.001ms !important; }
    }
    ::selection{ background:var(--accent); color:#0C0C0C; }
    button { font-family: 'Kanit', sans-serif; }
    img { max-width: 100%; display: block; }

    .dashboard-root { display: flex; min-height: 100vh; width: 100%; max-width: 100vw; position:relative; }
    .dashboard-root::before{
      content:""; position:fixed; inset:0; z-index:0; pointer-events:none;
      background-image:
        linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
      background-size:56px 56px;
      mask-image:radial-gradient(ellipse 70% 55% at 50% 0%, #000 40%, transparent 100%);
    }
    .dashboard-root::after{
      content:""; position:fixed; z-index:0; pointer-events:none;
      width:900px; height:900px; border-radius:50%; top:-460px; left:50%;
      background:radial-gradient(circle, rgba(0,196,140,0.14), transparent 70%);
      transform:translateX(-50%);
    }
    .sidebar-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.6);
      z-index: 40; display: none;
    }
    .sidebar-overlay.show { display: block; animation: fadeIn .25s var(--ease); }
    @keyframes fadeIn{ from{ opacity:0; } to{ opacity:1; } }
    .sidebar {
      width: 260px; flex-shrink: 0; background: var(--surface);
      border-right: 1px solid var(--border); display: flex; flex-direction: column;
      padding: 20px 16px 16px; position: fixed; left: 0; top: 0;
      height: 100vh; overflow-y: auto; z-index: 30;
    }
    .sidebar-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 22px; padding: 0 4px;
    }
    .brand { display: flex; align-items: center; gap: 10px; min-width: 0; }
    .brand-logo-slot { height: 34px; display: flex; align-items: center; gap:9px; flex-shrink: 0; }
    .brand-logo-img { height: 30px; width: auto; max-width: 170px; object-fit: contain; display: block; }
    .brand-logo-fallback {
      width: 30px; height: 30px; border-radius: 8px;
      border: 1px dashed rgba(0,196,140,0.5); color: var(--accent);
      align-items: center; justify-content: center; display: none; flex-shrink:0;
    }
    .brand-wordmark{ font-family:var(--display); font-size:16px; text-transform:uppercase; letter-spacing:.06em; color:var(--text); font-weight:800; }
    .brand-wordmark em{ font-style:normal; color:var(--accent-2); }
    .close-btn {
      display: none; background: none; border: none; color: var(--text-dim);
      font-size: 18px; padding: 4px 8px; cursor:pointer;
    }
    .sidebar-section-label {
      font-family:var(--mono);
      font-size: 10px; font-weight: 700; letter-spacing: 0.12em;
      color: var(--text-dimmer); text-transform: uppercase;
      margin: 14px 8px 8px;
    }
    .sidebar-nav { display: flex; flex-direction: column; gap: 2px; }
    .nav-item {
      display: flex; align-items: center; gap: 12px;
      background: none; border: none; width: 100%;
      padding: 10px 12px; border-radius: 999px;
      color: var(--text-dim); font-size: 13.5px; font-weight: 500;
      text-align: left; transition: background .2s ease, color .2s ease, transform .2s ease;
      position: relative; cursor:pointer;
    }
    .nav-item:hover { background: rgba(255,255,255,0.045); color: var(--text); transform:translateX(2px); }
    .nav-item.nav-active { background: var(--accent-soft); color: var(--accent-2); font-weight: 600; }
    .nav-icon { width: 17px; height:17px; flex-shrink: 0; display:flex; align-items:center; justify-content:center; }
    .nav-icon svg { width: 16px; height: 16px; }
    .nav-badge { margin-left: auto; background: var(--accent-grad); color: #0C0C0C; font-family:var(--mono); font-size: 10px; font-weight: 800; padding: 1px 7px; border-radius: 999px; }
    .sidebar-user {
      display: flex; align-items: center; gap: 10px;
      padding: 10px; margin-top: 10px; margin-bottom: 4px;
      border-radius: 14px; background: var(--surface-2); border: 1px solid var(--border);
    }
    .sidebar-user-avatar {
      width: 34px; height: 34px; border-radius: 50%; flex-shrink: 0;
      background: var(--accent-soft); color: var(--accent-2);
      display: flex; align-items: center; justify-content: center;
      font-family:var(--mono); font-size: 13px; font-weight: 800; text-transform: uppercase;
    }
    .sidebar-user-info { min-width: 0; flex: 1; }
    .sidebar-user-name { font-size: 12.5px; font-weight: 700; color: var(--text); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; text-transform: capitalize; }
    .sidebar-user-email { font-size: 11px; color: var(--text-dimmer); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .logout-full-btn {
      margin-top: 8px; width: 100%; padding: 11px; border-radius: 999px;
      background: rgba(255,92,92,0.1); border: 1px solid rgba(255,92,92,0.3);
      color: #FFB3AC; font-family:var(--mono); font-size: 12px; font-weight: 700; letter-spacing:.05em; text-transform:uppercase;
      display: flex; align-items: center; justify-content: center; gap: 8px;
      transition: background .2s ease; text-decoration: none; cursor: pointer;
    }
    .logout-full-btn:hover { background: rgba(255,92,92,0.2); }
    .main-content { flex: 1; min-width: 0; max-width: 100%; display: flex; flex-direction: column; margin-left: 260px; position:relative; z-index:1; }

    .topbar {
      position: sticky; top: 0; z-index: 25;
      display: flex; align-items: center; justify-content: space-between;
      gap: 12px; padding: 14px 28px;
      background: rgba(12,12,12,0.86); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--border);
      flex-wrap: nowrap;
    }
    .topbar-left { display: flex; align-items: center; gap: 14px; min-width: 0; flex: 1 1 auto; overflow: hidden; }
    .hamburger {
      display: none; flex-direction: column; justify-content: center; gap: 4px;
      width: 38px; height: 38px; border-radius: 10px;
      background: var(--surface-2); border: 1px solid var(--border);
      align-items: center; flex-shrink: 0; cursor:pointer;
    }
    .hamburger span { width: 16px; height: 2px; background: var(--text); border-radius: 2px; }
    .page-title { min-width: 0; overflow: hidden; }
    .page-title h1 { font-family:var(--display); text-transform:uppercase; letter-spacing:.01em; font-size: 21px; font-weight: 700; margin: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .page-title p { font-size: 12.5px; color: var(--text-dim); margin: 3px 0 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .topbar-right { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
    .search-box { display: flex; align-items: center; gap: 8px; background: var(--surface-2); border: 1px solid var(--border); border-radius: 999px; padding: 8px 14px; min-width: 0; flex-shrink: 0; transition: padding .2s ease; }
    .search-box input { background: none; border: none; outline: none; color: var(--text); font-size: 13px; width: 190px; max-width: 100%; min-width: 0; font-family:'Kanit',sans-serif; }
    .search-box input::placeholder { color: var(--text-dimmer); }
    .search-icon { width:15px; height:15px; opacity: 0.7; flex-shrink: 0; display:flex; }
    .icon-btn {
      position: relative; width: 38px; height: 38px; border-radius: 999px;
      background: var(--surface-2); border: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; cursor:pointer; transition:border-color .2s ease, transform .2s ease;
    }
    .icon-btn svg { width: 16px; height:16px; }
    .icon-btn:hover{ border-color: rgba(0,196,140,0.45); transform:translateY(-1px); }
    .notif-dot {
      position: absolute; top: 7px; right: 8px; width: 7px; height: 7px;
      border-radius: 50%; background: var(--red); border: 1.5px solid var(--surface-2);
      animation: notifPulse 2.2s ease-in-out infinite;
    }
    @keyframes notifPulse{ 0%,100%{ box-shadow:0 0 0 0 rgba(255,92,92,.5); } 50%{ box-shadow:0 0 0 4px rgba(255,92,92,0); } }
    .topbar-user { position: relative; flex-shrink: 0; }
    .topbar-user-btn {
      display: flex; align-items: center; gap: 10px;
      background: var(--surface-2); border: 1px solid var(--border);
      border-radius: 999px; padding: 5px 12px 5px 5px;
      transition: border-color .2s ease; cursor:pointer;
    }
    .topbar-user-btn:hover { border-color: rgba(0,196,140,0.45); }
    .topbar-user-avatar {
      width: 28px; height: 28px; border-radius: 50%; flex-shrink: 0;
      background: var(--accent-grad); color: #0C0C0C;
      display: flex; align-items: center; justify-content: center;
      font-family:var(--mono); font-size: 12px; font-weight: 800; text-transform: uppercase;
    }
    .topbar-user-name { font-size: 12.5px; font-weight: 700; color: var(--text); max-width: 130px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; text-transform: capitalize; }
    .topbar-user-caret { font-size: 10px; color: var(--text-dimmer); }
    .topbar-user-menu {
      position: absolute; top: calc(100% + 10px); right: 0; width: 230px;
      background: var(--surface-2); border: 1px solid var(--border);
      border-radius: 16px; padding: 8px;
      box-shadow: 0 18px 40px rgba(0,0,0,0.55);
      opacity: 0; visibility: hidden; transform: translateY(-6px);
      transition: opacity .2s var(--ease), transform .2s var(--ease), visibility .2s ease;
      z-index: 60;
      max-width: calc(100vw - 24px);
    }
    .topbar-user.open .topbar-user-menu { opacity: 1; visibility: visible; transform: translateY(0); }
    .topbar-user-menu-email { padding: 8px 10px 10px; border-bottom: 1px solid var(--border); margin-bottom: 6px; }
    .topbar-user-menu-email .label { font-family:var(--mono); font-size: 10px; font-weight: 700; color: var(--text-dimmer); text-transform: uppercase; letter-spacing: .05em; }
    .topbar-user-menu-email .value { font-size: 12.5px; font-weight: 600; color: var(--text); margin-top: 2px; word-break: break-all; }
    .topbar-user-menu-item {
      display: flex; align-items: center; gap: 9px; width: 100%;
      padding: 9px 10px; border-radius: 10px;
      background: none; border: none; text-align: left;
      font-size: 12.5px; font-weight: 600; color: var(--text-dim);
      transition: background .15s ease, color .15s ease; cursor:pointer;
    }
    .topbar-user-menu-item svg { width:14px; height:14px; margin-right:1px; vertical-align:-2px; }
    .topbar-user-menu-item:hover { background: rgba(255,255,255,0.05); color: var(--text); }
    .topbar-user-menu-item.danger:hover { background: rgba(255,92,92,0.16); color: #FFB3AC; }

    .content-area { padding: 24px 28px 48px; min-width: 0; max-width: 100%; overflow-x: hidden; }
    .stats-grid { display: grid; grid-template-columns: repeat(4, minmax(0,1fr)); gap: 16px; margin-bottom: 20px; }
    .stat-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 18px; padding: 18px 18px 16px; min-width: 0;
      transition: border-color .2s ease, transform .2s ease;
      opacity:0; transform:translateY(14px); animation: cardPop .5s var(--ease) forwards;
    }
    .stats-grid .stat-card:nth-child(1){ animation-delay:.03s; }
    .stats-grid .stat-card:nth-child(2){ animation-delay:.09s; }
    .stats-grid .stat-card:nth-child(3){ animation-delay:.15s; }
    .stats-grid .stat-card:nth-child(4){ animation-delay:.21s; }
    @keyframes cardPop{ to{ opacity:1; transform:translateY(0); } }
    .stat-card:hover { border-color: rgba(0,196,140,0.4); transform: translateY(-3px); }
    .stat-accent { border-color: rgba(0,196,140,0.4); background: linear-gradient(160deg, rgba(0,196,140,0.08), var(--surface) 60%); }
    .stat-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
    .stat-icon { width:18px; height:18px; color: var(--accent-2); }
    .stat-delta { font-family:var(--mono); font-size: 10.5px; font-weight: 700; padding: 2px 8px; border-radius: 999px; }
    .stat-delta.up { color: #8fe0ac; background: rgba(61,220,132,0.16); }
    .stat-value {
      font-family:var(--display); font-size: 26px; font-weight:800; letter-spacing: -0.01em;
      background: linear-gradient(180deg, #646973 0%, #D7E2EA 100%);
      -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; color:#D7E2EA;
    }
    .stat-label { font-size: 12.5px; color: var(--text-dim); margin-top: 4px; }
    .stat-bar { height: 5px; background: rgba(255,255,255,0.07); border-radius: 999px; margin-top: 12px; overflow: hidden; }
    .stat-bar-fill { height: 100%; width:0; background: var(--accent-grad); border-radius: 999px; transition: width 1.1s var(--ease) .3s; }
    .mid-grid { display: grid; grid-template-columns: 1.7fr 1fr; gap: 16px; margin-bottom: 16px; align-items: start; }
    .bottom-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; align-items: start; }
    .card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 18px; padding: 20px; margin-bottom: 16px; min-width: 0;
      opacity:0; transform:translateY(14px); animation: cardPop .5s var(--ease) .1s forwards;
    }
    .card-header { display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; margin-bottom: 16px; flex-wrap: wrap; }
    .card-title { font-family:var(--display); text-transform:uppercase; letter-spacing:.01em; font-size: 15px; font-weight: 700; margin: 0; }
    .card-sub { font-size: 12px; color: var(--text-dim); margin: 3px 0 0; }
    .table-wrapper { overflow-x: auto; max-width: 100%; -webkit-overflow-scrolling: touch; }
    .runs-table { width: 100%; border-collapse: collapse; min-width: 640px; }
    .runs-table th {
      text-align: left; font-family:var(--mono); font-size: 10px; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.08em; color: var(--text-dimmer);
      padding: 0 10px 10px; border-bottom: 1px solid var(--border);
    }
    .runs-table td { padding: 12px 10px; border-bottom: 1px solid var(--border); font-size: 13px; vertical-align: middle; }
    .runs-table tr:last-child td { border-bottom: none; }
    .runs-table tbody tr { transition: background .15s ease; cursor:pointer; }
    .runs-table tbody tr:hover { background: rgba(255,255,255,0.025); }
    .t-name { font-weight: 600; font-size: 13px; }
    .t-sub { font-size: 11.5px; color: var(--text-dimmer); margin-top: 2px; }
    .type-col { color: var(--text-dim); }
    .date-col { color: var(--text-dim); white-space: nowrap; }
    .budget-col { font-weight: 700; white-space: nowrap; font-family:var(--mono); font-size:12.5px; }
    .region-tag { font-family:var(--mono); font-size: 10.5px; font-weight: 700; padding: 3px 9px; border-radius: 999px; border: 1px solid; white-space: nowrap; }
    .status-badge { font-family:var(--mono); font-size: 10.5px; font-weight: 700; padding: 4px 10px; border-radius: 999px; white-space: nowrap; text-transform:uppercase; letter-spacing:.03em; }
    .status-active { background: rgba(61,220,132,0.16); color: #8fe0ac; }
    .status-field { background: rgba(255,212,0,0.16); color: #FFE68A; }
    .status-complete { background: rgba(154,165,177,0.18); color: #C9D3D9; }
    .status-review { background: rgba(0,196,140,0.18); color: #7CD859; }
    .progress-wrap { display: flex; align-items: center; gap: 8px; min-width: 100px; }
    .progress-bar { flex: 1; height: 6px; background: rgba(255,255,255,0.08); border-radius: 999px; overflow: hidden; }
    .progress-fill { height: 100%; width:0; background: var(--accent-grad); border-radius: 999px; transition:width 1s var(--ease) .2s; }
    .progress-pct { font-family:var(--mono); font-size: 11px; color: var(--text-dim); flex-shrink: 0; }
    .activity-list { display: flex; flex-direction: column; gap: 4px; padding: 0; margin: 0; }
    .activity-item { display: flex; align-items: flex-start; gap: 12px; padding: 12px 6px; border-radius: 12px; transition: background .15s ease; cursor:pointer; }
    .activity-item:hover { background: rgba(255,255,255,0.03); }
    .act-icon { width:17px; height:17px; flex-shrink: 0; color: var(--accent-2); margin-top:2px; }
    .act-body { flex: 1; min-width: 0; }
    .act-text { font-size: 13px; margin: 0; line-height: 1.5; word-wrap: break-word; }
    .act-time { font-family:var(--mono); font-size: 11px; color: var(--text-dimmer); margin-top: 4px; display: block; }
    .team-list { display: flex; flex-direction: column; gap: 4px; padding: 0; margin: 0; }
    .team-item { display: flex; align-items: center; gap: 12px; padding: 10px 6px; border-radius: 12px; transition: background .15s ease; cursor:pointer; }
    .team-item:hover { background: rgba(255,255,255,0.03); }
    .member-avatar {
      position: relative; width: 38px; height: 38px; border-radius: 50%;
      background: var(--surface-2); border: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      font-family:var(--mono); font-size: 12px; font-weight: 700; color: var(--accent-2); flex-shrink: 0;
    }
    .online-dot { position: absolute; bottom: -1px; right: -1px; width: 10px; height: 10px; border-radius: 50%; border: 2px solid var(--surface); }
    .dot-active { background: var(--green); }
    .dot-away { background: var(--amber); }
    .member-info { flex: 1; min-width: 0; }
    .member-name { font-size: 13px; font-weight: 600; }
    .member-role { font-size: 11.5px; color: var(--text-dimmer); margin-top: 1px; }
    .member-projects { text-align: center; flex-shrink: 0; }
    .proj-count { display: block; font-family:var(--display); font-size: 15px; color: var(--accent-2); }
    .proj-label { display: block; font-family:var(--mono); font-size: 9.5px; color: var(--text-dimmer); text-transform:uppercase; }
    .milestone-list { display: flex; flex-direction: column; padding: 0; margin: 0; }
    .milestone-item { display: flex; align-items: flex-start; gap: 12px; padding: 12px 6px; border-radius: 12px; position: relative; transition: background .15s ease; cursor:pointer; }
    .milestone-item:hover { background: rgba(255,255,255,0.03); }
    .ms-date { width: 34px; flex-shrink: 0; text-align: center; }
    .ms-date span { display: block; }
    .ms-date span:first-child { font-family:var(--mono); font-size: 9.5px; font-weight: 700; color: var(--accent-2); text-transform: uppercase; }
    .ms-date span:last-child { font-family:var(--display); font-size: 16px; }
    .ms-line { width: 2px; align-self: stretch; display: flex; justify-content: center; flex-shrink: 0; }
    .ms-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--accent); margin-top: 4px; }
    .ms-body { flex: 1; min-width: 0; }
    .ms-event { font-size: 13px; font-weight: 600; }
    .ms-project { font-size: 11.5px; color: var(--text-dimmer); margin-top: 2px; }
    .ms-tag { font-family:var(--mono); font-size: 9.5px; font-weight: 700; padding: 2px 8px; border-radius: 999px; background: rgba(255,92,92,0.18); color: #FFB3AC; flex-shrink: 0; align-self: flex-start; text-transform:uppercase; }
    .ms-done-tag { background: rgba(61,220,132,0.18); color: #8fe0ac; }
    .ms-done .ms-event { text-decoration: line-through; color: var(--text-dimmer); }
    .donut-chart { display: flex; justify-content: center; margin: 6px 0 14px; cursor:pointer; }
    .donut-svg { width: 150px; height: 150px; max-width: 100%; }
    .donut-svg circle[stroke-dasharray] { stroke-dasharray: 0 212; transition: stroke-dasharray 1.2s var(--ease) .2s; }
    .donut-svg.drawn circle:nth-child(2) { stroke-dasharray: 52 212; }
    .donut-svg.drawn circle:nth-child(3) { stroke-dasharray: 42 212; }
    .donut-svg.drawn circle:nth-child(4) { stroke-dasharray: 38 212; }
    .donut-svg.drawn circle:nth-child(5) { stroke-dasharray: 34 212; }
    .donut-svg.drawn circle:nth-child(6) { stroke-dasharray: 30 212; }
    .donut-svg.drawn circle:nth-child(7) { stroke-dasharray: 16 212; }
    .donut-num { font-family:var(--display); font-size: 21px; fill: var(--text); font-weight:700; }
    .donut-label { font-family:var(--mono); font-size: 8.5px; fill: var(--text-dimmer); text-transform: uppercase; letter-spacing: 0.06em; }

        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;flex-wrap:wrap;gap:6px">
          <div><span style="font-weight:700;color:#D7E2EA;font-size:13.5px">${b.site}</span>
          <span class="region-tag" style="margin-left:10px;color:${facilityAccents[b.facility]};border-color:${facilityAccents[b.facility]};background:${facilityAccents[b.facility]}22;font-size:10.5px">${b.facility}</span></div>
          <div style="text-align:right;font-size:12.5px;color:var(--text-dim)"><span style="color:#D7E2EA;font-weight:700;font-family:var(--mono)">${fmt(b.spent)}</span> / ${fmt(b.allocated)}
          <span style="margin-left:10px;color:${pct > 80 ? "#FFB3AC" : "#7CD859"};font-weight:700;font-family:var(--mono)">${pct}%</span></div>
        </div>
        <div style="height:8px;background:rgba(255,255,255,0.08);border-radius:999px;overflow:hidden">
          <div class="progress-fill" data-w="${pct}" style="background:${barGrad};height:100%;transition-delay:.3s"></div>
        </div>
      </div>`;
    }).join('<div style="height:18px"></div>');

    return `
      <section class="stats-grid">${statsHtml}</section>
      <div class="card"><div class="card-header"><div><h2 class="card-title">Budget by Facility</h2><p class="card-sub">Allocation vs spend</p></div></div>
      <div>${rows}</div></div>
    `;
  }

  function renderTraining() {
    const stats = [
      { icon: "book-open", value: resourceLibrary.length, label: "Resources", bar: 80, accent: true },
      { icon: "download", value: resourceLibrary.reduce((a, p) => a + p.downloads, 0).toLocaleString(), label: "Total Downloads", bar: 90 },
      { icon: "file-text", value: resourceLibrary.reduce((a, p) => a + p.pages, 0).toLocaleString(), label: "Total Pages", bar: 65 },
      { icon: "calendar-days", value: "2025", label: "Latest Year", bar: 100 }
    ];
    const statsHtml = stats.map(s =>
      `<div class="stat-card ${s.accent ? "stat-accent" : ""}" onclick="go404()">
        <div class="stat-top"><span class="stat-icon"><i data-lucide="${s.icon}"></i></span></div>
        <div class="stat-value">${s.value}</div><div class="stat-label">${s.label}</div>
        <div class="stat-bar"><div class="stat-bar-fill" data-w="${s.bar}"></div></div>
      </div>`
    ).join("");

    const cards = resourceLibrary.map(pub =>
      `<div class="pub-card" onclick="go404()">
        <div style="width:30px;height:30px;color:var(--accent-2);margin-bottom:12px"><i data-lucide="file-text" style="width:26px;height:26px"></i></div>
        <div style="font-weight:700;color:#D7E2EA;font-size:14px;margin-bottom:6px;line-height:1.4">${pub.title}</div>
        <div style="font-size:12px;color:var(--text-dimmer);margin-bottom:14px">${pub.type} · ${pub.year} · ${pub.pages} pages</div>
        <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px">
          <span style="font-family:var(--mono);font-size:11.5px;color:#7CD859;font-weight:700">${pub.downloads.toLocaleString()} downloads</span>
          <button class="btn-outline" style="padding:5px 12px;font-size:10.5px" onclick="event.stopPropagation();go404()">View</button>
        </div>
      </div>`
    ).join("");

    return `
      <section class="stats-grid">${statsHtml}</section>
      <div class="card"><div class="card-header"><div><h2 class="card-title">Resource Library</h2><p class="card-sub">Spec sheets, playbooks, and reports</p></div></div>
      <div class="pub-grid">${cards}</div></div>
    `;
  }

  function toggleHtml(id, value) {
    return `<div class="toggle-switch" data-toggle="${id}" style="background:${value ? "#00C48C" : "rgba(255,255,255,0.14)"}">
      <div class="toggle-knob" style="left:${value ? "20px" : "3px"}"></div></div>`;
  }

  function renderSettings() {
    const s = state.settings;
    const displayName = currentUsername || currentEmail || "Signed out";
    const displayEmail = currentEmail || "No account signed in";
    return `
      <div class="card"><div class="card-header"><div><h2 class="card-title">Account</h2><p class="card-sub">Signed-in profile — shown wherever your account appears in the console</p></div></div>
        <div style="display:flex;align-items:center;gap:18px;margin-bottom:20px;flex-wrap:wrap">
          <div style="width:64px;height:64px;border-radius:50%;border:2px solid rgba(0,196,140,0.4);background:var(--accent-soft);color:var(--accent-2);display:flex;align-items:center;justify-content:center;font-family:var(--display);font-size:24px;text-transform:uppercase;flex-shrink:0">${currentInitial}</div>
          <div><div style="font-weight:700;color:#D7E2EA;font-size:16px;text-transform:capitalize">${displayName}</div>
          <div style="font-size:13px;color:var(--text-dim);margin-top:2px">${displayEmail}</div>
          <div style="font-family:var(--mono);font-size:12px;color:#7CD859;margin-top:4px">${currentUser ? (currentUser.role === 'admin' ? 'Admin account' : 'Operator account') : 'Not signed in'}</div></div>
        </div>
        <button class="btn-outline" style="border-color:#00C48C;color:#7CD859" onclick="go404()">Edit Profile</button>
      </div>
      <div class="card"><div class="card-header"><div><h2 class="card-title">Preferences</h2><p class="card-sub">Notifications and display</p></div></div>
        <div>
          <div style="display:flex;justify-content:space-between;align-items:center;padding:18px 0;border-bottom:1px solid rgba(255,255,255,0.06)">
            <div><div style="font-weight:700;color:#D7E2EA;font-size:13.5px">Push Notifications</div><div style="font-size:12.5px;color:var(--text-dim);margin-top:2px">Receive alerts for status changes and deadline shifts</div></div>
            ${toggleHtml("notifications", s.notifications)}
          </div>
          <div style="display:flex;justify-content:space-between;align-items:center;padding:18px 0;border-bottom:1px solid rgba(255,255,255,0.06)">
            <div><div style="font-weight:700;color:#D7E2EA;font-size:13.5px">Weekly Email Digest</div><div style="font-size:12.5px;color:var(--text-dim);margin-top:2px">Summary of run activity sent every Monday</div></div>
            ${toggleHtml("emailDigest", s.emailDigest)}
          </div>
          <div style="display:flex;justify-content:space-between;align-items:center;padding:18px 0;border-bottom:1px solid rgba(255,255,255,0.06)">
            <div><div style="font-weight:700;color:#D7E2EA;font-size:13.5px">Dark Mode</div><div style="font-size:12.5px;color:var(--text-dim);margin-top:2px">Use dark colour scheme across the console</div></div>
            ${toggleHtml("darkMode", s.darkMode)}
          </div>
          <div style="display:flex;justify-content:space-between;align-items:center;padding-top:18px">
            <div><div style="font-weight:700;color:#D7E2EA;font-size:13.5px">Language</div><div style="font-size:12.5px;color:var(--text-dim);margin-top:2px">Interface display language</div></div>
            <select class="pref-select" id="lang-select">${["English", "French", "Spanish", "Mandarin", "Portuguese"].map(l => `<option ${s.language === l ? "selected" : ""}>${l}</option>`).join("")}</select>
          </div>
        </div>
      </div>
      <div class="card"><div class="card-header"><div><h2 class="card-title">Session</h2><p class="card-sub">Sign out of this account on this device</p></div></div>
        <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:14px">
          <div style="font-size:12.5px;color:var(--text-dim)">Signed in as <strong style="color:#D7E2EA">${displayEmail}</strong>. Logging out will clear this session and return you to the sign-in screen.</div>
          <button class="btn-outline" style="border-color:rgba(255,92,92,0.4);color:#FFB3AC;flex-shrink:0" id="settings-logout-btn">Logout</button>
        </div>
      </div>
      <div class="card"><div class="card-header"><div><h2 class="card-title">Danger Zone</h2><p class="card-sub">Irreversible account actions</p></div></div>
        <div style="display:flex;gap:12px;flex-wrap:wrap">
          <button class="btn-outline" style="border-color:rgba(255,92,92,0.4);color:#FFB3AC" onclick="go404()">Reset Password</button>
          <button class="btn-outline" style="border-color:rgba(255,92,92,0.4);color:#FFB3AC" onclick="go404()">Delete Account</button>
        </div>
      </div>
    `;
  }

  const pageRenderers = {
    dashboard: renderDashboard,
    runs: renderRuns,
    teams: renderTeams,
    products: renderProducts,
    reports: renderReports,
    schedule: renderSchedule,
    budget: renderBudget,
    training: renderTraining,
    settings: renderSettings
  };

  function renderNav() {
    const mainItems = navItems.slice(0, 6);
    const mgmtItems = navItems.slice(6);
    function itemHtml(item) {
      const badge = item.id === "runs" ? `<span class="nav-badge">8</span>` : "";
      return `<button class="nav-item ${state.activeNav === item.id ? "nav-active" : ""}" data-nav="${item.id}">
        <span class="nav-icon"><i data-lucide="${item.icon}"></i></span><span>${item.label}</span>${badge}</button>`;
    }
    document.getElementById("nav-main").innerHTML = mainItems.map(itemHtml).join("");
    document.getElementById("nav-management").innerHTML = mgmtItems.map(itemHtml).join("");
  }

  function renderPage() {
    const page = pageMap[state.activeNav];
    document.getElementById("page-title-text").textContent = page.title;
    document.getElementById("page-sub-text").textContent = page.sub;
    document.getElementById("content-area").innerHTML = pageRenderers[state.activeNav]();
    renderNav();
    const settingsLogoutBtn = document.getElementById("settings-logout-btn");
    if (settingsLogoutBtn) settingsLogoutBtn.addEventListener("click", logout);
    window.scrollTo({ top: 0, left: 0, behavior: "instant" });
    animateStatBars();
    if (window.lucide) lucide.createIcons();
  }

  function navigateTo(id) {
    state.activeNav = id;
    closeSidebar();
    closeTopbarUserMenu();
    renderPage();
  }

  function openSidebar() {
    document.getElementById("sidebar").classList.add("sidebar-open");
    document.getElementById("sidebar-overlay").classList.add("show");
  }
  function closeSidebar() {
    document.getElementById("sidebar").classList.remove("sidebar-open");
    document.getElementById("sidebar-overlay").classList.remove("show");
  }
  function closeTopbarUserMenu() {
    document.getElementById("topbar-user").classList.remove("open");
  }

  document.getElementById("hamburger-btn").addEventListener("click", openSidebar);
  document.getElementById("close-sidebar-btn").addEventListener("click", closeSidebar);
  document.getElementById("sidebar-overlay").addEventListener("click", closeSidebar);
  document.getElementById("notif-btn").addEventListener("click", go404);
  document.getElementById("logout-btn").addEventListener("click", logout);
  document.getElementById("topbar-logout-btn").addEventListener("click", logout);
  document.getElementById("topbar-user-btn").addEventListener("click", function(e) {
    e.stopPropagation();
    document.getElementById("topbar-user").classList.toggle("open");
  });
  document.addEventListener("click", closeTopbarUserMenu);

  document.addEventListener("click", function(e) {
    const navBtn = e.target.closest("[data-nav]");
    if (navBtn) { navigateTo(navBtn.getAttribute("data-nav")); return; }
    const filterBtn = e.target.closest(".run-filter-btn");
    if (filterBtn) { state.runFilter = filterBtn.getAttribute("data-filter"); renderPage(); return; }
    const toggle = e.target.closest("[data-toggle]");
    if (toggle) {
      const key = toggle.getAttribute("data-toggle");
      state.settings[key] = !state.settings[key];
      renderPage();
      return;
    }
  });

  document.addEventListener("input", function(e) {
    if (e.target && e.target.id === "product-search-input") {
      state.productSearch = e.target.value;
      const caretPos = e.target.selectionStart;
      renderPage();
      const input = document.getElementById("product-search-input");
      if (input) { input.focus(); input.setSelectionRange(caretPos, caretPos); }
    }
  });

  document.addEventListener("change", function(e) {
    if (e.target && e.target.id === "lang-select") {
      state.settings.language = e.target.value;
    }
  });

  paintUserChrome();
  renderPage();
  if (window.lucide) lucide.createIcons();
</script>
</body>
</html>
